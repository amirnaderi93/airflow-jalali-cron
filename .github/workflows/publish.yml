name: Publish to PyPI

# Publishes the package to PyPI when a GitHub Release is published, or on
# manual dispatch. Uses PyPI Trusted Publishing (OIDC) -- no API token needed.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/airflow-jalali-cron/
    permissions:
      id-token: write   # required for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate PyPI trove classifiers
        run: |
          python -m pip install --upgrade trove-classifiers
          python - <<'PY'
          import sys, tomllib
          from trove_classifiers import classifiers as valid
          declared = tomllib.load(open("pyproject.toml", "rb"))["project"].get("classifiers", [])
          invalid = [c for c in declared if c not in valid]
          if invalid:
              print("::error::Invalid trove classifier(s): " + ", ".join(invalid))
              sys.exit(1)
          print(f"All {len(declared)} classifiers are valid trove classifiers.")
          PY

      - name: Build and check distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
